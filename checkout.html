<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechShop - Магазин гаджетів</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
<header class="header">
  <div class="logo">TechShop</div>
       
  <nav class="main-nav">
    <ul class="nav-list">
      <li><a href="./index.html">Головна</a></li>
      <li><a href="#">Каталог</a></li>
      <li><a href="#">Про нас</a></li>
      <li><a href="#">Реєстрація</a></li>
    </ul>
  </nav>

  <div class="user-actions">
    <button class="btn btn-cart">Кошик (0)</button>
  </div>
</header>

<main>
    <h2>Оформлення замовлення</h2>

    <form action="#" method="POST" class="checkout-form">
<!-- Блок 1: Особисті дані -->   
<fieldset>
    <legend>1. Особисті дані</legend>
    <div class="form-group">
      <label for="fullName">ПІБ:</label>
      <input
        type="text"
        id="fullName"
        name="fullName"
        required
        placeholder="Іванов Іван Іванович"
      />
    </div>


    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />
    </div>
    <div class="form-group">
      <label for="phone">Телефон:</label>
      <!-- Валідація на 10-12 цифр + код країни -->
      <input
        type="tel"
        id="phone"
        name="phone"
        pattern="[\+]\d{2}\d{10}"
        placeholder="+380991234567"
        required
        title="Формат: +380XXXXXXXXX"
      />
    </div>
  </fieldset>

<!-- Блок 2: Доставка-->   
    <fieldset>
        <legend>2. Спосіб доставки</legend>
        <div class="form-radio">
        <input
            type="radio"
            id="deliveryNova"
            name="delivery"
            value="nova_poshta"
            checked
        />
        <label for="deliveryNova">Нова Пошта</label>
        </div>
        <div class="form-radio">
        <input
            type="radio"
            id="deliveryCourier"
            name="delivery"
            value="courier"
        />
        <label for="deliveryCourier">Кур'єр за адресою</label>
        </div>
    
        <div class="form-group">
        <label for="city">Місто:</label>
        <select id="city" name="city">
            <option value="kyiv">Київ</option>
            <option value="lviv">Львів</option>
            <option value="odesa">Одеса</option>
        </select>
        </div>
    </fieldset>

<!-- Блок 3: Коментар та згода -->   
    <textarea>
    </textarea>

    <br>
    <label>
      <input type="checkbox" required> Я погоджуюсь з правилами магазину</input>
    </label>
    
    <button type="submit" class="btn btn-primary">Підтвердити замовлення</button>

</main>





<footer>
    000-000-00-00 <br>
    idk.whattoputhere@gmail.com <br>
    &copy; 2025 TechShop


    <section>
        <h2 id = "ci">Контактна іформація</h2>
    </section>
    <nav>
      <ul>
        <li><a href="">Instagram</a></li>
        <li><a href="">TikTok</a></li>
        <li><a href="">FaceBook</a></li>
        <li><a href="">Reddit</a></li>
        <li><a href="">LinkedIn</a></li>
      </ul>
    </nav>
    <br><br>
    <form action="#">
        <h3>Підписка на розсилку :3</h3>
        <input type="email">
        <button>Підписатися</button>
    </form>
    <br><br>
</footer>

</body>

</html>
